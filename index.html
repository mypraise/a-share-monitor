<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A股利好监控</title>
<script src="https://lf3-cdn-tos.bytecdntp.com/cdn/expire-1-M/tailwindcss/3.0.23/tailwind.min.js"></script>
<script src="https://registry.npmmirror.com/echarts/5.5.0/files/dist/echarts.min.js"></script>
<link href="https://fonts.googleapis.cnpmjs.org/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#060a12;--bg2:#0c1220;--card:#111a2e;--card2:#162038;
  --bdr:#1a2744;--bdr2:#243358;
  --cyan:#06b6d4;--cyan2:rgba(6,182,212,.12);
  --red:#f43f5e;--red2:rgba(244,63,94,.1);--red3:rgba(244,63,94,.6);
  --grn:#10b981;--grn2:rgba(16,185,129,.1);--grn3:rgba(16,185,129,.6);
  --ylw:#eab308;--ylw2:rgba(234,179,8,.1);
  --orn:#f97316;--orn2:rgba(249,115,22,.12);
  --pur:#818cf8;--pur2:rgba(129,140,248,.1);
  --t1:#f1f5f9;--t2:#94a3b8;--t3:#475569;--t4:#1e293b;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans SC',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh}
.mono{font-family:'JetBrains Mono',monospace}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--t3);border-radius:2px}
a{color:inherit;text-decoration:none}

/* Mode toggle */
.mode-toggle{display:flex;background:var(--bg);border:1px solid var(--bdr);border-radius:8px;overflow:hidden;flex-shrink:0}
.mode-btn{padding:4px 14px;font-size:11px;font-weight:600;color:var(--t3);border:none;background:transparent;cursor:pointer;transition:all .2s;font-family:'Noto Sans SC',sans-serif}
.mode-btn.active{background:var(--cyan2);color:var(--cyan);border-color:rgba(6,182,212,.3)}
.mode-simple [data-mode="pro"]{display:none!important}
.mode-simple .two-col{display:block}
.mode-simple .two-col>div{margin-bottom:16px}
.mode-simple .pick-section-bc{display:none!important}
.mode-push [data-mode="pro"]{display:none!important}
.mode-push [data-mode="all"]{display:none!important}
.mode-push #pushView{display:block!important}
.mode-push #globalBar{display:block!important}
#pushView{display:none}

/* Push notification cards */
.push-container{max-width:680px;margin:0 auto;padding:8px 0}
.push-card{background:var(--card);border:1px solid var(--bdr);border-radius:10px;padding:16px 20px;margin-bottom:10px;position:relative;transition:border-color .2s}
.push-card:hover{border-color:rgba(6,182,212,.2)}
.push-card .push-time{font-size:10px;color:var(--t3);font-family:'JetBrains Mono',monospace}
.push-card .push-title{font-size:14px;font-weight:700;margin:6px 0 8px;display:flex;align-items:center;gap:8px}
.push-item{display:flex;align-items:flex-start;gap:8px;padding:7px 0;border-bottom:1px solid rgba(26,39,68,.6);font-size:12px;line-height:1.6}
.push-item:last-child{border-bottom:none}
.push-rank{min-width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;margin-top:1px}
.push-rank.top3{background:var(--red2);color:var(--red)}
.push-rank.normal{background:var(--t4);color:var(--t3)}
.push-lvl{display:inline-block;font-size:10px;font-weight:700;padding:1px 6px;border-radius:4px;margin-right:4px}
.push-lvl-S{background:linear-gradient(135deg,#f43f5e,#e11d48);color:#fff}
.push-lvl-A{background:var(--red2);color:var(--red)}
.push-lvl-B{background:var(--orn2);color:var(--orn)}
.push-lvl-C{background:var(--t4);color:var(--t3)}

.card{background:var(--card);border:1px solid var(--bdr);border-radius:12px;overflow:hidden;transition:border-color .3s}
.card:hover{border-color:rgba(6,182,212,.18)}
.card-h{padding:14px 20px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.card-h h2{font-size:14px;font-weight:700;color:var(--t2);display:flex;align-items:center;gap:8px}
.up{color:var(--red)}.down{color:var(--grn)}.flat{color:var(--t3)}

/* Top bar */
.topbar{background:linear-gradient(135deg,var(--card),var(--bg2));border:1px solid var(--bdr);border-radius:12px;padding:16px 24px;margin:16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;position:relative;overflow:hidden}
.topbar h1{font-size:20px;font-weight:900;background:linear-gradient(135deg,var(--cyan),#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.pill{font-size:11px;padding:3px 12px;border-radius:20px;font-family:'JetBrains Mono',monospace}
.pill-r{background:var(--red2);color:var(--red);border:1px solid rgba(244,63,94,.2)}
.pill-g{background:var(--grn2);color:var(--grn);border:1px solid rgba(16,185,129,.2)}
.pill-y{background:var(--ylw2);color:var(--ylw);border:1px solid rgba(234,179,8,.2)}
.pill-c{background:var(--cyan2);color:var(--cyan);border:1px solid rgba(6,182,212,.2)}
@keyframes scan{0%{transform:translateX(-100%)}100%{transform:translateX(300%)}}
.scan{position:absolute;bottom:0;left:0;width:33%;height:1px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);animation:scan 5s ease-in-out infinite}

.page{padding:0 16px 16px}
.stitle{font-size:16px;font-weight:700;color:var(--t1);margin:20px 0 12px;display:flex;align-items:center;gap:8px}
.stitle .dot{width:4px;height:18px;border-radius:2px}
.sub{font-size:12px;font-weight:400;color:var(--t3);margin-left:8px}

/* Realtime Picks */
.pick-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:12px}
.pick-section-label{grid-column:1/-1;font-size:13px;font-weight:700;padding:10px 0 4px;display:flex;align-items:center;gap:8px;color:var(--t2);border-bottom:1px solid var(--bdr)}
.pick-section-label .sl-icon{width:18px;height:18px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;color:#fff}
.pick-card{background:var(--card);border:1px solid var(--bdr);border-radius:10px;padding:16px 18px;transition:all .3s;position:relative;overflow:visible}
.pick-card:hover{border-color:rgba(6,182,212,.25);transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,0,0,.3);cursor:pointer}
.pick-card.level-S{border-color:rgba(244,63,94,.35);background:linear-gradient(135deg,rgba(244,63,94,.06),var(--card));box-shadow:0 0 20px rgba(244,63,94,.08)}
.pick-card.level-S:hover{border-color:rgba(244,63,94,.5);box-shadow:0 6px 24px rgba(244,63,94,.15)}
.pick-card.level-A{border-color:rgba(249,115,22,.25);background:linear-gradient(135deg,rgba(249,115,22,.04),var(--card))}
.pick-card.level-A:hover{border-color:rgba(249,115,22,.4)}
.pick-card .pick-tip{display:none;position:absolute;bottom:calc(100% + 6px);left:8px;right:8px;background:linear-gradient(135deg,#162038,#1a2744);border:1px solid var(--bdr2);border-radius:8px;padding:12px 16px;font-size:11px;line-height:1.7;color:var(--t2);z-index:50;box-shadow:0 8px 24px rgba(0,0,0,.6);pointer-events:none}
.pick-card .pick-tip::after{content:'';position:absolute;top:100%;left:24px;border:6px solid transparent;border-top-color:var(--bdr2)}
.pick-card:hover .pick-tip{display:block}
.pick-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.pick-name{font-size:15px;font-weight:700}.pick-code{font-size:11px;color:var(--t3);font-family:'JetBrains Mono',monospace}
.pick-metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin:10px 0}
.pm{text-align:center}.pm-label{font-size:9px;color:var(--t3);margin-bottom:3px}.pm-val{font-size:14px;font-weight:700;font-family:'JetBrains Mono',monospace}
.pick-streak{display:inline-flex;align-items:center;gap:4px;font-size:10px;padding:2px 8px;border-radius:10px}
.streak-hot{background:rgba(244,63,94,.15);color:var(--red);border:1px solid rgba(244,63,94,.15)}
.streak-warm{background:var(--orn2);color:var(--orn);border:1px solid rgba(249,115,22,.12)}
.streak-none{background:var(--t4);color:var(--t3);border:1px solid var(--bdr)}
.pick-news{font-size:11px;color:var(--t3);margin-top:10px;padding-top:10px;border-top:1px solid var(--bdr);line-height:1.5}
.pick-news a:hover{color:var(--cyan)!important;text-decoration:underline}
.elasticity-bar{position:absolute;top:0;left:0;height:3px;border-radius:0 0 2px 0}

/* Hot 7 Grid */
.hot-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px}
.hot-card{background:var(--card);border:1px solid var(--bdr);border-radius:10px;padding:14px 16px;position:relative;overflow:hidden;transition:all .3s;cursor:default}
.hot-card:hover{border-color:rgba(6,182,212,.25);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.hot-rank{position:absolute;top:10px;right:12px;font-size:26px;font-weight:900;font-family:'JetBrains Mono',monospace;opacity:.08;line-height:1}
.hot-rank.top3{color:var(--red);opacity:.15}
.hot-name{font-size:14px;font-weight:700}.hot-code{font-size:10px;color:var(--t3);font-family:'JetBrains Mono',monospace}
.hot-price-row{display:flex;align-items:baseline;gap:10px;margin:8px 0 6px}
.hot-price{font-size:20px;font-weight:700;font-family:'JetBrains Mono',monospace}
.hot-pct{font-size:12px;font-weight:600;font-family:'JetBrains Mono',monospace;padding:2px 8px;border-radius:4px}
.reason-tag{font-size:9px;padding:2px 7px;border-radius:10px;background:var(--orn2);color:var(--orn);border:1px solid rgba(249,115,22,.12)}
.hot-news-item{font-size:10px;color:var(--t3);line-height:1.4;padding:2px 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Sector/ETF Panel */
.sec-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:10px}
.sec-card{background:var(--card);border:1px solid var(--bdr);border-radius:10px;padding:14px 16px;transition:border-color .3s}
.sec-card:hover{border-color:rgba(129,140,248,.2)}
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.sec-name{font-size:13px;font-weight:700;color:var(--pur)}
.sec-etf{font-size:11px;font-family:'JetBrains Mono',monospace;padding:2px 8px;border-radius:4px;background:var(--pur2);color:var(--pur);border:1px solid rgba(129,140,248,.12)}
.sec-desc{font-size:10px;color:var(--t3);margin-bottom:6px}
.sec-bar{display:flex;height:4px;border-radius:2px;overflow:hidden;margin:6px 0}
.sec-bar-bull{background:var(--red3)}.sec-bar-bear{background:var(--grn3)}.sec-bar-neut{background:var(--t4)}
.sec-stocks{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.sec-chip{font-size:10px;font-family:'JetBrains Mono',monospace;padding:2px 6px;border-radius:3px;border:1px solid var(--bdr)}
.sec-reason{font-size:11px;font-weight:600;margin:6px 0 2px}
.sec-catalyst{font-size:10px;color:var(--t2);line-height:1.6;padding:3px 0 3px 10px;border-left:2px solid;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sec-catalyst.bull{border-color:var(--red3)}.sec-catalyst.bear{border-color:var(--grn3)}
.sec-direction{font-size:11px;font-weight:700;padding:2px 8px;border-radius:4px;margin-left:6px}
.dir-bull{background:var(--red2);color:var(--red)}.dir-bear{background:var(--grn2);color:var(--grn)}.dir-neut{background:var(--ylw2);color:var(--ylw)}

/* News */
.news-tabs{display:flex;gap:5px;flex-wrap:wrap}
.ntab{background:none;border:1px solid var(--bdr);color:var(--t3);font-size:11px;padding:4px 14px;border-radius:20px;cursor:pointer;transition:all .2s;font-family:'Noto Sans SC',sans-serif}
.ntab:hover{border-color:var(--cyan);color:var(--t2)}
.ntab.active{color:var(--cyan);border-color:rgba(6,182,212,.35);background:var(--cyan2)}
.nlist{max-height:700px;overflow-y:auto}
.nrow{padding:14px 20px;border-bottom:1px solid rgba(26,39,68,.5);transition:background .2s}
.nrow:hover{background:var(--card2)}
.ntop{display:flex;align-items:flex-start;gap:8px}
.stag{font-size:10px;font-weight:600;padding:2px 8px;border-radius:4px;flex-shrink:0;margin-top:2px}
.stag-b{background:var(--red2);color:var(--red)}.stag-r{background:var(--grn2);color:var(--grn)}.stag-n{background:var(--ylw2);color:var(--ylw)}
.sbar{width:36px;height:4px;border-radius:2px;background:var(--t4);overflow:hidden;flex-shrink:0;margin-top:6px}
.sfill{height:100%;border-radius:2px}
.ntitle{font-size:13px;line-height:1.6;flex:1}.ntitle a{transition:color .2s}.ntitle a:hover{color:var(--cyan);text-decoration:underline}
.ntime{font-size:10px;color:var(--t3);font-family:'JetBrains Mono',monospace;flex-shrink:0;margin-top:2px}
.nmeta{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px;padding-left:52px}
.chip{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-family:'JetBrains Mono',monospace;padding:2px 7px;border-radius:4px}
.chip-s.up{background:var(--red2);border:1px solid rgba(244,63,94,.12)}
.chip-s.down{background:var(--grn2);border:1px solid rgba(16,185,129,.12)}
.chip-s.flat{background:rgba(71,85,105,.1);border:1px solid rgba(71,85,105,.12);color:var(--t3)}
.chip-sec{background:var(--pur2);color:var(--pur);border:1px solid rgba(129,140,248,.12)}
.chip-etf{background:var(--orn2);color:var(--orn);border:1px solid rgba(249,115,22,.1)}

.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:1000px){.two-col,.sec-grid{grid-template-columns:1fr}.pick-grid{grid-template-columns:1fr 1fr}}
@media(max-width:600px){.pick-grid,.hot-grid{grid-template-columns:1fr}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fi{animation:fadeUp .4s ease-out forwards;opacity:0}
.fd1{animation-delay:.05s}.fd2{animation-delay:.1s}.fd3{animation-delay:.15s}.fd4{animation-delay:.2s}.fd5{animation-delay:.25s}
</style>
</head>
<body>
<!-- TOP BAR -->
<header class="topbar fi">
  <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap">
    <h1>A股利好监控</h1>
    <span style="font-size:10px;background:rgba(6,182,212,.08);color:var(--cyan);padding:3px 10px;border-radius:4px;border:1px solid rgba(6,182,212,.12)">同花顺 + 财联社</span>
    <div class="mode-toggle" id="modeToggle">
      <button class="mode-btn active" data-m="simple" onclick="toggleMode('simple')">简洁</button>
      <button class="mode-btn" data-m="push" onclick="toggleMode('push')">推送</button>
      <button class="mode-btn" data-m="pro" onclick="toggleMode('pro')">Pro</button>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
    <span class="pill pill-r">利好 101</span>
    <span class="pill pill-g">利空 15</span>
    <span class="pill pill-y">中性 85</span>
    <span class="pill pill-c">共 201</span>
    <span style="width:1px;height:16px;background:var(--bdr);margin:0 4px"></span>
    <span class="pill" style="background:rgba(6,182,212,.08);color:var(--cyan);border:1px solid rgba(6,182,212,.15);font-size:10px">实时 190 · 夜间 11</span>
    <span class="pill" style="background:rgba(129,140,248,.08);color:#818cf8;border:1px solid rgba(129,140,248,.15);font-size:10px" title="API调用: 同花顺×3页 + 腾讯行情 + 腾讯K线 + Telegram">耗时 36.0s · API 71次</span>
    <span class="pill" style="background:rgba(234,179,8,.08);color:#eab308;border:1px solid rgba(234,179,8,.15);font-size:10px" title="通过CREDITS_TOTAL和CREDITS_DAILY环境变量配置">学分: 未配置</span>
    <span class="mono" style="font-size:10px;color:var(--t3);margin-left:6px">数据 2026-03-17 15:50:20</span>
    <span class="mono" id="liveClock" style="font-size:10px;color:var(--cyan);margin-left:4px"></span>
    <span class="mono" id="refreshIndicator" style="font-size:10px;color:var(--cyan);margin-left:6px;transition:opacity .5s"></span>
  </div>
  <div class="scan"></div>
</header>

<!-- ══ GLOBAL MARKET SENTIMENT BAR ══ -->
<div id="globalBar" style="background:rgba(15,23,42,.85);border-bottom:1px solid var(--bdr);padding:10px 24px;backdrop-filter:blur(12px)">
  <div style="max-width:1400px;margin:0 auto;display:flex;align-items:center;gap:12px;flex-wrap:wrap">
    <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
      <span style="font-size:11px;color:var(--t2);font-weight:600;letter-spacing:1px">外围情绪</span>
      <div id="gaugeBox" style="width:100px;height:50px;flex-shrink:0"></div>
      <span id="gaugeLabel" style="font-size:13px;font-weight:700;min-width:60px"></span>
    </div>
    <div style="width:1px;height:32px;background:var(--bdr);flex-shrink:0"></div>
    <div id="globalItems" style="display:flex;align-items:center;gap:14px;flex-wrap:wrap;flex:1"></div>
  </div>
</div>

<div class="page">

<!-- ══ SECTION 1: 今日热点股 TOP7 (always visible, full-width in simple) ══ -->
<div data-mode="all">
  <div class="stitle fi fd1"><span class="dot" style="background:var(--cyan)"></span>今日热点股 TOP 7<span class="sub" id="narrativeBanner"></span></div>
  <div class="hot-grid" id="hotGrid"></div>
</div>

<!-- ══ SECTION 2: 实时利好精选 (S/A always, B/C only in Pro) ══ -->
<div data-mode="all" style="margin-top:16px">
  <div class="stitle fi fd2"><span class="dot" style="background:var(--red)"></span>实时新闻 · 利好精选<span class="sub">利好程度×时效×弹性综合排序 | S/A/B/C影响等级 | 连涨龙头(当前+历史) | 实时报价</span></div>
  <div class="pick-grid" id="pickGrid"></div>
</div>

<!-- ══ SECTION 3: 热门板块/ETF (always visible) ══ -->
<div data-mode="all" style="margin-top:16px">
  <div class="stitle fi fd3"><span class="dot" style="background:var(--pur)"></span>热门板块 / ETF<span class="sub">情绪分布 + ETF实时行情 + 关联个股</span></div>
  <div class="sec-grid" id="secGrid"></div>
</div>

<!-- ══ SECTION 4: 夜间新闻总结 (always, compact in simple) ══ -->
<div data-mode="all" style="margin-top:20px">
  <div class="stitle fi fd4"><span class="dot" style="background:var(--ylw)"></span>夜间新闻总结<span class="sub">22:00–08:30 共 11 条 | 重点摘要</span></div>
  <div id="nightSummary" class="card fi fd4" style="margin-bottom:16px;padding:16px 20px"></div>
</div>

<!-- ══ SECTION 4b: 夜间新闻详情 (Pro only) ══ -->
<div data-mode="pro">
  <div class="stitle fi fd4"><span class="dot" style="background:var(--ylw)"></span>夜间新闻详情<span class="sub">全部 11 条 | 按影响力排序</span></div>
  <div class="card fi fd4" style="margin-bottom:16px">
    <div class="card-h">
      <div class="news-tabs" id="nightTabs">
        <button class="ntab active" data-f="all">全部</button>
        <button class="ntab" data-f="利好">利好</button>
        <button class="ntab" data-f="利空">利空</button>
        <button class="ntab" data-f="中性">中性</button>
      </div>
    </div>
    <div class="nlist" id="nightList"></div>
  </div>
</div>

<!-- ══ SECTION 5: 全部资讯 (Pro only) ══ -->
<div data-mode="pro">
  <div class="stitle fi fd5"><span class="dot" style="background:var(--t3)"></span>全部资讯<span class="sub">201 条 | 实时 190 + 夜间 11</span></div>
  <div class="card fi fd5">
    <div class="card-h">
      <div class="news-tabs" id="allTabs">
        <button class="ntab active" data-f="all">全部</button>
        <button class="ntab" data-f="利好">利好</button>
        <button class="ntab" data-f="利空">利空</button>
        <button class="ntab" data-f="中性">中性</button>
      </div>
    </div>
    <div class="nlist" id="allList"></div>
  </div>
</div>

</div>

<!-- ══ PUSH NOTIFICATION VIEW ══ -->
<div id="pushView" class="page">
  <div class="push-container" id="pushContainer"></div>

F", "desc": "银行/保险/券商"}, {"code": "159899", "name": "网安ETF", "desc": "安全软件/密码/信创"}], "tags": ["美股", "港股", "A股"], "ctime": 1773730355}, {"title": "特朗普称美前总统点赞对伊动武 各方否认", "digest": "美国总统特朗普16日称，他最近与一名美国前总统通话，这名前总统赞扬了美军在伊朗的行动，并说：“真希望我做了你所做的事”。 据美国《纽约时报》报道，特朗普当天在白宫向媒体透露上述消息，但拒绝透露那名前总统的名字，“我不想说是谁，不想给他惹麻烦”。 美国目前共有4位在世的前总统，分别是共和党籍的乔治·W·布什，民主党籍的比尔·克林顿、贝拉克·奥巴马和约瑟夫·拜登。当记者询问是否为布什，特朗普给出了否定回答。 特朗普暗示所谈论的是一名民主党人，称此人“所隶属的政党”厌恶特朗普。按特朗普说法，这名前总统“恰好喜欢我，我也喜欢这个人，这是一个聪明人”。 美媒将范围缩小到三位民主党籍前总统。但是，这三人身边的匿名消息人士均予以否认，要么表示前总统未曾对特朗普说过上述话，要么表示前总统近期压根没有与特朗普交谈过。 不过，《纽约时报》指出，多年来，特朗普在演讲、社交媒体帖文及其他场合多次嘲讽过这三位民主党籍前总统及其政绩。(新华社)", "sentiment": "中性", "impact": 0.0, "time": "14:51", "date": "03-17", "url": "https://news.10jqka.com.cn/20260317/c675346364.shtml", "stocks": [], "sectors": [], "etfs": [], "tags": ["A股", "美股"], "ctime": 1773730307}, {"title": "美“福特”号航母火灾被曝持续超30小时", "digest": "美国“福特”号航母12日发生的火灾持续超过30小时，600多人因火灾失去床铺，只能睡在桌子或地板上。消息称，火灾始于航母主洗衣区的一台烘干机并迅速蔓延，船上人员用了30多个小时才将其扑灭。火灾没有对航母推进装置造成损害，船舶依然处于全面运行状态。不过，航母上有2人因火灾造成的“非致命伤”接受治疗，数十人报告吸入火灾烟雾。“福特”号航母执行海上任务已进入第10个月，先是从地中海前往拉美参与对委内瑞拉的军事行动，最近又从加勒比海来到中东，参与对伊朗的军事行动。据悉，“福特”号航母此次任务可能持续至5月，这是航母通常任务期的两倍时间。最近，该航母频遭故障困扰，包括舰上约650个厕所堵塞问题等。此前，美国海军否认有关“福特”号卫生系统出现严重故障的报道。美国海军的声明说，该舰相关系统“在预期参数范围内运行”，未对战备状态和任务执行能力造成影响。“马桶堵塞事件被训练有素的相关人员迅速解决，堵塞时间极短。”（央视新闻）", "sentiment": "中性", "impact": 0.0, "time": "14:51", "date": "03-17", "url": "https://news.10jqka.com.cn/20260317/c675346351.shtml", "stocks": [], "sectors": [], "etfs": [], "tags": ["美股", "港股", "A股"], "ctime": 1773730271}, {"title": "联想集团与英伟达联合发布新一代混合式AI解决方案", "digest": "在GTC 2026大会上，联想集团与英伟达联合发布新一代联想Hybrid AI Advantage  (混合式AI优势集)解决方案，旨在加速 AI 落地、缩短首 token 时间（TTFT）。联想集团董事长杨元庆表示，随着agentic AI推动推理工作负载呈指数级增长，成本控制和单token性能将变得至关重要。联想集团还成为NVIDIA Vera Rubin NVL72的全球首发合作伙伴。较上一代相比，Vera Rubin系统吞吐量提升10倍，单token成本下降至前一代的1/10。（科创板日报）", "sentiment": "利好", "impact": 1.0, "time": "14:48", "date": "03-17", "url": "https://news.10jqka.com.cn/20260317/c675346310.shtml", "stocks": [], "sectors": ["人工智能"], "etfs": [{"code": "515070", "name": "AIE 报》报道，特朗普当天在白宫向媒体透露上述消息，但拒绝透露那名前总统的名字，“我不想说是谁，不想给他惹麻烦”。 美国目前共有4位在世的前总统，分别是共和党籍的乔治·W·布什，民主党籍的比尔·克林顿、贝拉克·奥巴马和约瑟夫·拜登。当记者询问是否为布什，特朗普给出了否定回答。 特朗普暗示所谈论的是一名民主党人，称此人“所隶属的政党”厌恶特朗普。按特朗普说法，这名前总统“恰好喜欢我，我也喜欢这个人，这是一个聪明人”。 美媒将范围缩小到三位民主党籍前总统。但是，这三人身边的匿名消息人士均予以否认，要么表示前总统未曾对特朗普说过上述话，要么表示前总统近期压根没有与特朗普交谈过。 不过，《纽约时报》指出，多年来，特朗普在演讲、社交媒体帖文及其他场合多次嘲讽过这三位民主党籍前总统及其政绩。(新华社)", "sentiment": "中性", "impact": 0.0, "time": "14:51", "date": "03-17", "url": "https://news.10jqka.com.cn/20260317/c675346364.shtml", "stocks": [], "sectors": [], "etfs": [], "tags": ["A股", "美股"], "ctime": 1773730307}, {"title": "美“福特”号航母火灾被曝持续超30小时", "digest": "美国“福特”号航母12日发生的火灾持续超过30小时，600多人因火灾失去床铺，只能睡在桌子或地板上。消息称，火灾始于航母主洗衣区的一台烘干机并迅速蔓延，船上人员用了30多个小时才将其扑灭。火灾没有对航母推进装置造成损害，船舶依然处于全面运行状态。不过，航母上有2人因火灾造成的“非致命伤”接受治疗，数十人报告吸入火灾烟雾。“福特”号航母执行海上任务已进入第10个月，先是从地中海前往拉美参与对委内瑞拉的军事行动，最近又从加勒比海来到中东，参与对伊朗的军事行动。据悉，“福特”号航母此次任务可能持续至5月，这是航母通常任务期的两倍时间。最近，该航母频遭故障困扰，包括舰上约650个厕所堵塞问题等。此前，美国海军否认有关“福特”号卫生系统出现严重故障的报道。美国海军的声明说，该舰相关系统“在预期参数范围内运行”，未对战备状态和任务执行能力造成影响。“马桶堵塞事件被训练有素的相关人员迅速解决，堵塞时间极短。”（央视新闻）", "sentiment": "中性", "impact": 0.0, "time": "14:51", "date": "03-17", "url": "https://news.10jqka.com.cn/20260317/c675346351.shtml", "stocks": [], "sectors": [], "etfs": [], "tags": ["美股", "港股", "A股"], "ctime": 1773730271}, {"title": "台媒：台空军称已寻获台F-16V坠海战机“黑匣子”并完成打捞", "digest": "台空军一架F-16V战机1月6日晚间坠海，飞行员失联。据中时新闻网、“中央社”等多家台媒3月17日最新消息，经过两个多月搜索，台空军昨日（16日）已于讯号定位区域寻获失事战机的“失事残存飞行资料记录器”（俗称“黑匣子”），并完成打捞。报道称，根据台空军此前发出的消息，台空军针对“黑匣子”所发出的讯号进行定位，确认讯号位置水深约2500米，已启动海外打捞公司进行支援打捞工作。台空军司令部17日中午发布新闻稿称，经多日水下勘探，于16日寻获“黑匣子”，经比对属失事F-16V战机所有，已完成打捞，并载运返回。台空军表示，后续“黑匣子”将被送往美国原厂鉴定，以查清战机失事原因。（环球网）", "sentiment": "中性", "impact": 0.0, "time": "14:46", "date": "03-17", "url": "https://news.10jqka.com.cn/20260317/c675346253.shtml", "stocks": [], "sectors": [], "etfs": [], "tags": ["美股", "港股", "A股"], "ctime": 1773729985}, {"title": "英国消费者信心指数降至去年1月以来新低", "digest": "标普全球16日发布报告称，由于中东地区爆发的冲突，英国消费者信心指数从2月的44.8降至3月的44.1，已降至2025年1月以来的最低水平。报告还称，英国家庭对其财务前景的悲观程度达到2023年年底以来的最高值，对大额支出的谨慎程度也达到2025年年初以来的最高值。英国家庭对于英国央行近期降息的预期也已下降。（央视新闻）", "sentiment": "中性", "impact": 0.0, "time": "14:44", "date": "03-17", "url": "https://news.10jqka.com.cn/20260317/c675346206.shtml", "stocks": [], "sectors": [], "etfs": [{"code": "159928", "name": "消费ETF", "desc": "家电/日用/零售"}], "tags": ["美股", "港股", "A股"], "ctime": 1773729871}, {"title": "北京今年将提供100万平方米创业空间、1万套青年人才公寓", "digest": "记者从深化“北京服务”赋能企业高质量发展新闻发布会上获悉，今年北京市将提供100万平方米创业空间，筹集1万套青年人才公寓。针对企业关注的融资问题，北京市将通过扩大小微企业融资、加大轻资产企业信用贷款投放、引导更多创投机构投早投小、完善上市融资机制等方式，为不同发展阶段的企业提供精准服务。青年人才创新创业服务方面，今年北京市将提供100万平方米创业空间、1万套青年人才公寓，鼓励各区为求职毕业生提供过渡性住所，助力青年学子走出校门奔赴人生新征程。今年，北京还将围绕科技成果“能转”“转成”等关键环节，健全高校院所成果转化尽职免责机制，为科研人员“松绑减负”；建立高校院所“一对一”服务机制，为科研团队提供全流程服务，打通政产学研用融合的“最后一公里”；壮大技术经理人队伍，提升科技成果转化效能，让成果更快进入市场。（央视新闻）", "sentiment": "中性", "impact": 0.0, "time": "14:41", "date": "03-17", "url": "https://news.10jqka.com.cn/20260317/c675346165.shtml", "stocks": [], "sectors": [], "etfs": [], "tags": ["港股", "A股"], "ctime": 1773729702}, {"title": "俄称连续4天密集击落飞向莫斯科的乌无人机", "digest": "俄罗斯首都莫斯科市长索比亚宁于3月17日通报称，当地时间零时至6时13分，又有38架飞往莫斯科市的无人机被击落。索比亚宁在社交平台发布的信息显示，本轮莫斯科市密集击落乌克兰无人机始于3月14日，每天都有数十架被击落。另据俄罗斯国防部通报，莫斯科时间3月16日晚8时至次日早7时，防空系统在全俄范围内拦截并摧毁206架乌克兰无人机，其中在莫斯科地区击落43架，包括40架飞往莫斯科市的无人机。（央视新闻）", "sentiment": "中性", "impact": 0.0, "time": "14:39", "date": "03-17", "url": "https://news.10jqka.com.cn/20260317/c675346114.shtml", "stocks": [], "sectors": ["无人机"], "etfs": [], "tags": ["美股", "港股", "A股"], "ctime": 1773729547}, {"title": "世界最大直径水下盾构隧道双层贯通", "digest": "3月17日，随着最后一块现浇车道板浇筑完成，由中铁十四局集团承建的济南黄岗路黄河隧道上层车道板全部完工，标志着世界最大直径水下盾构隧道实现双层贯通。据了解，济南黄岗路黄河隧道全长约5.75公里，其中盾构段长约3.3公里，采用开挖直径17.5米的“山河号”盾构机施工。隧道为单洞双层结构，上下层共设置六车道，设计时速60公里，可实现两洞隧道的交通功能。(新华社)", "sentiment": "中性", "impact": 0.0, "time": "14:27", "date": "03-17", "url": "https://news.10jqka.com.cn/20260317/c675345862.shtml", "stocks": [], "sectors": [], "etfs": [], "tags": ["港股", "A股"], "ctime": 1773728874}, {"title": "南向资金净卖出超30亿港元", "digest": "据同花顺iFinD数据，截至目前，南向资金净卖出超30亿港元，其中港股通（沪）卖出超14.43亿港元，港股通（深）卖出超15.83亿港元。", "sentiment": "中性", "impact": 0.0, "tim function fmtAmt(v){if(!v)return'-';if(v>=10000)return(v/10000).toFixed(1)+'亿';return v.toFixed(0)+'万'}

function cls(v){return v>0?'up':v<0?'down':'flat'}

// ═══ Realtime Picks ═══
function renderPicks(){
  const g=document.getElementById('pickGrid');
  const maxE=Math.max(...PICKS.map(p=>p.elasticity),1);
  const lvlStyle={S:'background:linear-gradient(135deg,#f43f5e,#e11d48);color:#fff;font-weight:900;font-size:13px;box-shadow:0 0 12px rgba(244,63,94,.4)',A:'background:var(--red2);color:var(--red);font-weight:700',B:'background:var(--orn2);color:var(--orn);font-weight:600',C:'background:var(--t4);color:var(--t3);font-weight:500'};
  const lvlColors={S:'#f43f5e',A:'#f97316',B:'#eab308',C:'#475569'};
  const lvlNames={S:'S级 · 重大利好',A:'A级 · 显著利好',B:'B级 · 一般利好',C:'C级 · 轻微利好'};

  // Group by level
  const groups={S:[],A:[],B:[],C:[]};
  PICKS.forEach(p=>{ const l=p.level||'C'; if(groups[l])groups[l].push(p); else groups.C.push(p); });

  let html='';
  ['S','A','B','C'].forEach(lvl=>{
    const items=groups[lvl];
    if(!items.length)return;
    const bcCls=(lvl==='B'||lvl==='C')?'pick-section-bc':'';
    html+=`<div class="pick-section-label ${bcCls}"><span class="sl-icon" style="background:${lvlColors[lvl]}">${lvl}</span>${lvlNames[lvl]}<span style="font-size:11px;font-weight:400;color:var(--t3);margin-left:auto">${items.length}只</span></div>`;
    items.forEach(p=>{
      const c=cls(p.change_pct);
      const streakCls=p.streak>=3?'streak-hot':p.streak>=1?'streak-warm':'streak-none';
      const streakTxt=p.streak>0?`${p.streak}连涨 +${p.total_gain.toFixed(1)}%`:'无连涨';
      const barW=(p.elasticity/maxE*100).toFixed(0);
      const ls=lvlStyle[p.level||'C']||lvlStyle.C;
      const maxS=p.max_streak||0;
      const maxSG=(p.max_streak_gain||0).toFixed(1);
      const histBadge=maxS>=2?`<span style="font-size:9px;color:var(--ylw);margin-left:4px">历史最高${maxS}连涨+${maxSG}%</span>`:'';
      const daily=p.daily||[];
      const maxD=Math.max(...daily.map(d=>Math.abs(d.pct)),0.5);
      const dailyBars=daily.length?`<div style="display:flex;align-items:flex-end;gap:2px;height:22px;margin-top:4px">${daily.map(d=>{
        const h=Math.max(3,Math.abs(d.pct)/maxD*20);
        const bc=d.pct>0?'var(--red3)':d.pct<0?'var(--grn3)':'var(--t3)';
        return `<div title="${d.date} ${d.pct>0?'+':''}${d.pct}%" style="width:14px;height:${h}px;background:${bc};border-radius:1px;flex-shrink:0"></div>`;
      }).join('')}<span style="font-size:8px;color:var(--t3);margin-left:4px;align-self:center">近${daily.length}日</span></div>`:'';
      const digest=(p.news_digest||'').replace(/"/g,'&quot;').replace(/</g,'&lt;');
      const newsLink=p.news_url||'';
      html+=`<div class="pick-card level-${p.level||'C'} ${bcCls}" ${newsLink?`onclick="window.open('${newsLink}','_blank')"`:''}">
        <div class="pick-tip"><b style="color:var(--red)">[${p.level}级利好]</b> ${p.news_title}<br><span style="color:var(--t3);margin-top:4px;display:inline-block">${digest||'暂无摘要'}</span><br><span style="font-size:10px;color:var(--cyan);margin-top:4px;display:inline-block">${newsLink?'点击查看原文 →':'无链接'}</span></div>
        <div class="elasticity-bar" style="width:${barW}%;background:linear-gradient(90deg,${lvlColors[p.level||'C']}88,transparent)"></div>
        <div class="pick-head">
          <div style="display:flex;align-items:center;gap:6px">
            <span style="display:inline-block;padding:1px 7px;border-radius:4px;font-size:11px;font-family:'JetBrains Mono',monospace;letter-spacing:1px;${ls}">${p.level||'C'}</span>
            <span class="pick-name">${p.name}</span> <span class="pick-code">${p.code}</span>
          </div>
          <span class="pick-streak ${streakCls}">${p.streak>=1?'&#x1F525;':''} ${streakTxt}</span>
        </div>
        <div class="pick-metrics">
          <div class="pm"><div class="pm-label">最新价</div><div class="pm-val ${c}">${p.price.toFixed(2)}</div></div>
          <div class="pm"><div class="pm-label">涨跌幅</div><div class="pm-val ${c}">${arrow(p.change_pct)}${p.change_pct.toFixed(2)}%</div></div>
          <div class="pm"><div class="pm-label">振幅</div><div class="pm-val mono" style="color:var(--t2)">${p.amplitude.toFixed(2)}%</div></div>
          <div class="pm"><div class="pm-label">综合分</div><div class="pm-val mono" style="color:${lvlColors[p.level||'C']};font-size:16px">${p.combined_score.toFixed(1)}</div></div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;margin-top:4px;flex-wrap:wrap">
          <span class="mono" style="font-size:10px;color:var(--t3)">弹性${p.elasticity.toFixed(1)}</span>
          <span class="mono" style="font-size:10px;color:var(--t3)">最高${p.high.toFixed(2)}</span>
          <span class="mono" style="font-size:10px;color:var(--t3)">最低${p.low.toFixed(2)}</span>
          <span class="mono" style="font-size:10px;color:var(--t3)">成交${fmtAmt(p.amount)}</span>
          ${histBadge}
        </div>
        ${dailyBars}
        <div class="pick-news"><span style="color:var(--cyan);font-weight:600">[${p.news_date} ${p.news_time}]</span> ${newsLink?`<a href="${newsLink}" target="_blank" onclick="event.stopPropagation()" style="color:var(--t1);text-decoration:none">${p.news_title}</a>`:`${p.news_title}`} ${newsLink?'<span style="color:var(--cyan);font-size:9px;margin-left:4px">→原文</span>':''}</div>
      </div>`;
    });
  });
  g.innerHTML=html;
}

// ═══ Hot 7 ═══
function renderHot7(){
  const g=document.getElementById('hotGrid');
  // Show narrative banner if LLM analysis is active
  const nb=document.getElementById('narrativeBanner');
  if(HOT7.length>0 && HOT7[0].narratives && HOT7[0].narratives.length>0){
    nb.innerHTML='AI叙事主线: '+HOT7[0].narratives.map(n=>`<span style="color:var(--cyan);font-weight:600;margin:0 2px">${n}</span>`).join(' · ');
    nb.style.color='var(--t2)';
  }
  g.innerHTML=HOT7.map((s,i)=>{
    const c=cls(s.change_pct);
    const pctBg=s.change_pct>0?'var(--red2)':s.change_pct<0?'var(--grn2)':'var(--t4)';
    const pctC=s.change_pct>0?'var(--red)':s.change_pct<0?'var(--grn)':'var(--t3)';
    const reasons=s.reasons.map(r=>`<span class="reason-tag">${r}</span>`).join('');
    const news=s.news.map(n=>`<div class="hot-news-item">· ${n}</div>`).join('');
    const narrativeTag=s.narrative?`<div style="font-size:10px;color:var(--cyan);margin-top:4px;padding:4px 8px;background:var(--cyan2);border-radius:4px;border:1px solid rgba(6,182,212,.12);line-height:1.5">${s.narrative}</div>`:'';
    const streakTag=s.streak>=2?`<span class="pick-streak streak-hot" style="margin-left:6px;font-size:9px">${s.streak}连涨</span>`
      :s.streak===1?`<span class="pick-streak streak-warm" style="margin-left:6px;font-size:9px">1连涨</span>`:'';
    return `<div class="hot-card">
      <div class="hot-rank ${i<3?'top3':''}">#${i+1}</div>
      <div style="display:flex;align-items:center"><span class="hot-name">${s.name}</span>${streakTag}</div>
      <div class="hot-code">${s.code} · 评分${s.score.toFixed(1)} · 提及${s.mentions}次</div>
      <div class="hot-price-row">
        <span class="hot-price ${c}">${s.price>0?s.price.toFixed(2):'--'}</span>
        <span class="hot-pct" style="background:${pctBg};color:${pctC}">${arrow(s.change_pct)}${s.change_pct.toFixed(2)}%</span>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:4px">${reasons}</div>
      ${narrativeTag}
      <div style="margin-top:8px;border-top:1px solid var(--bdr);padding-top:6px">${news}</div>
    </div>`;
  }).join('');
}

// ═══ Sector/ETF Panel ═══
function renderSectors(){
  const g=document.getElementById('secGrid');
  g.innerHTML=SECS.slice(0,12).map(s=>{
    const total=s.bull+s.bear+(s.count-s.bull-s.bear);
    const bullW=total?Math.round(s.bull/total*100):0;
    const bearW=total?Math.round(s.bear/total*100):0;
    const neutW=100-bullW-bearW;
    const etfC=cls(s.etf_change_pct);
    const etfPrice=s.etf_price>0?`${s.etf_price.toFixed(3)} <span class="${etfC}" style="font-weight:700">${arrow(s.etf_change_pct)}${s.etf_change_pct.toFixed(2)}%</span>`:'--';
    const dir=s.direction||'中性';
    const dirCls=dir==='偏多'?'dir-bull':dir==='偏空'?'dir-bear':'dir-neut';
    const chips=s.stocks.map(sc=>{
      const c2=cls(sc.change_pct);
      return `<span class="sec-chip ${c2}" style="border-color:${sc.change_pct>0?'rgba(244,63,94,.15)':sc.change_pct<0?'rgba(16,185,129,.15)':'var(--bdr)'}">${sc.name} <b>${arrow(sc.change_pct)}${sc.change_pct.toFixed(2)}%</b></span>`;
    }).join('');
    // Catalysts
    const catBull=(s.catalysts_bull||[]).map(t=>`<div class="sec-catalyst bull">${t}</div>`).join('');
    const catBear=(s.catalysts_bear||[]).map(t=>`<div class="sec-catalyst bear">${t}</div>`).join('');
    const catalysts=(catBull||catBear)?`<div style="margin-top:6px">${catBull}${catBear}</div>`:'';
    return `<div class="sec-card">
      <div class="sec-head">
        <div style="display:flex;align-items:center">
          <span class="sec-name">${s.sector}</span>
          <span class="sec-direction ${dirCls}">${dir}</span>
        </div>
        <span class="sec-etf">${s.etf_name} ${s.etf_code}</span>
      </div>
      <div class="sec-desc">${s.desc} · 提及${s.count}次 · ETF: <span class="mono">${etfPrice}</span></div>
      <div class="sec-reason" style="color:${dir==='偏多'?'var(--red)':dir==='偏空'?'var(--grn)':'var(--ylw)'}">判断依据: ${s.reason||''}</div>
      <div class="sec-bar">
        <div class="sec-bar-bull" style="width:${bullW}%"></div>
        <div class="sec-bar-neut" style="width:${neutW}%"></div>
        <div class="sec-bar-bear" style="width:${bearW}%"></div>
      </div>
      <div style="display:flex;gap:8px;font-size:10px;color:var(--t3);margin-top:4px">
        <span>利好 <b style="color:var(--red)">${s.bull}</b></span>
        <span>利空 <b style="color:var(--grn)">${s.bear}</b></span>
        <span>中性 <b style="color:var(--ylw)">${s.count-s.bull-s.bear}</b></span>
      </div>
      ${catalysts}
      ${chips?`<div class="sec-stocks">${chips}</div>`:''}
    </div>`;
  }).join('');
}

// ═══ News renderer (reusable) ═══
function renderNewsList(list, el, maxScore){
  if(!maxScore) maxScore=Math.max(...list.map(n=>n.impact),1);
  el.innerHTML=list.map(n=>{
    const tc=n.sentiment==='利好'?'stag-b':n.sentiment==='利空'?'stag-r':'stag-n';
    const bc=n.sentiment==='利好'?'var(--red3)':n.sentiment==='利空'?'var(--grn3)':'var(--ylw)';
    const bw=Math.max(10,(n.impact/maxScore)*100);
    const parts=[];
    (n.stocks||[]).forEach(sc=>{
      const q=Q[sc.code];
      if(q&&q.price>0){
        const c2=cls(q.change_pct);
        const a=q.change_pct>0?'↑':q.change_pct<0?'↓':'';
        parts.push(`<span class="chip chip-s ${c2}">${sc.name} ${sc.code} <b>${a}${Math.abs(q.change_pct).toFixed(2)}%</b></span>`);
      }else{
        parts.push(`<span class="chip chip-s flat">${sc.name} ${sc.code}</span>`);
      }
    });
    (n.sectors||[]).forEach(s=>parts.push(`<span class="chip chip-sec">${s}</span>`));
    (n.etfs||[]).forEach(e=>{
      const q=Q[e.code];
      let ex='';
      if(q&&q.price>0){const a=q.change_pct>0?'↑':q.change_pct<0?'↓':'';ex=` <span class="${cls(q.change_pct)}" style="font-weight:700">${a}${Math.abs(q.change_pct).toFixed(2)}%</span>`}
      parts.push(`<span class="chip chip-etf">${e.name} ${e.code}${ex}</span>`);
    });
    const meta=parts.length?`<div class="nmeta">${parts.join('')}</div>`:'';
    const link=n.url?`<a href="${n.url}" target="_blank">${n.title}</a>`:n.title;
    return `<div class="nrow">
      <div class="ntop">
        <span class="stag ${tc}">${n.sentiment}</span>
        <div class="sbar"><div class="sfill" style="width:${bw}%;background:${bc}"></div></div>
        <div class="ntitle">${link}</div>
        <span class="ntime">${n.date?n.date+' ':''}${n.time}</span>
      </div>${meta}
    </div>`;
  }).join('');
}

// ═══ Tab system ═══
function setupTabs(tabsId, listId, allData){
  const tabs=document.getElementById(tabsId);
  const list=document.getElementById(listId);
  let cur='all';
  function getData(f){
    if(f==='利好')return allData.filter(n=>n.sentiment==='利好');
    if(f==='利空')return allData.filter(n=>n.sentiment==='利空');
    if(f==='中性')return allData.filter(n=>n.sentiment==='中性');
    return allData;
  }
  function render(f){
    cur=f||'all';
    renderNewsList(getData(cur),list);
    tabs.querySelectorAll('.ntab').forEach(t=>t.classList.toggle('active',t.dataset.f===cur));
  }
  tabs.addEventListener('click',e=>{if(e.target.classList.contains('ntab'))render(e.target.dataset.f)});
  render('all');
}

function renderNightSummary(){

// ═══ Live Quote Auto-Refresh (JSONP via Tencent API) ═══
var _refreshTimer=null;
var _refreshCount=0;

function symCode(code){
  return code.startsWith('6')?'sh'+code:'sz'+code;
}

function isMarketOpen(){
  var d=new Date();
  var utc=d.getTime()+d.getTimezoneOffset()*60000;
  var bj=new Date(utc+8*3600000);
  var wd=bj.getDay(),hr=bj.getHours(),mi=bj.getMinutes();
  if(wd<1||wd>5)return false;
  if((hr===9&&mi>=25)||(hr===10)||(hr===11&&mi<=35))return true;  // slightly wider window
  if(hr===13||hr===14||(hr===15&&mi===0))return true;
  return false;
}

function collectAllCodes(){
  var codes=new Set();
  PICKS.forEach(function(p){if(p.code)codes.add(p.code);});
  HOT7.forEach(function(s){if(s.code)codes.add(s.code);});
  SECS.forEach(function(s){
    if(s.etf_code)codes.add(s.etf_code);
    (s.stocks||[]).forEach(function(sc){if(sc.code)codes.add(sc.code);});
  });
  Object.keys(Q).forEach(function(k){codes.add(k);});
  return Array.from(codes);
}

function refreshQuotes(){
  var codes=collectAllCodes();
  if(!codes.length)return;
  var syms=codes.map(symCode);
  // Split into batches of 30
  for(var i=0;i<syms.length;i+=30){
    var batch=syms.slice(i,i+30);
    var url='https://qt.gtimg.cn/q='+batch.join(',')+'&_t='+Date.now();
    var sc=document.createElement('script');
    sc.src=url;
    sc.onload=function(){
      // Parse global variables set by the script
      batch.forEach(function(sym){
        try{
          var val=window['v_'+sym];
          if(!val)return;
          var f=val.split('~');
          if(f.length>=46){
            var code=f[2];
            var price=parseFloat(f[3])||0;
            var prev=parseFloat(f[4])||0;
            var pct=parseFloat(f[32])||0;
            var high=parseFloat(f[33])||0;
            var low=parseFloat(f[34])||0;
            var vol=parseInt(f[6])||0;
            if(price>0){
              Q[code]={price:price,prev_close:prev,change_pct:pct,high:high,low:low,volume:vol};
              // Update PICKS data
              PICKS.forEach(function(p){
                if(p.code===code){
                  p.price=price;p.change_pct=pct;p.high=high;p.low=low;
                  p.amplitude=prev>0?((high-low)/prev*100):0;
                }
              });
              // Update HOT7 data
              HOT7.forEach(function(s){
                if(s.code===code){s.price=price;s.change_pct=pct;}
              });
              // Update SECS data
              SECS.forEach(function(s){
                if(s.etf_code===code){s.etf_price=price;s.etf_change_pct=pct;}
                (s.stocks||[]).forEach(function(sc){
                  if(sc.code===code){sc.price=price;sc.change_pct=pct;}
                });
              });
            }
          }
        }catch(e){}
      });
      // Re-render after last batch
      _refreshCount++;
      renderPicks();
      renderHot7();
      renderSectors();
      updateRefreshIndicator();
      this.parentNode.removeChild(this);
    };
    sc.onerror=function(){this.parentNode.removeChild(this);};
    document.head.appendChild(sc);
  }
}

function updateRefreshIndicator(){
  var el=document.getElementById('refreshIndicator');
  if(!el)return;
  var d=new Date();
  var utc=d.getTime()+d.getTimezoneOffset()*60000;
  var bj=new Date(utc+8*3600000);
  var hh=String(bj.getHours()).padStart(2,'0');
  var mm=String(bj.getMinutes()).padStart(2,'0');
  var ss=String(bj.getSeconds()).padStart(2,'0');
  el.innerHTML='<span style="color:var(--cyan)">⚡ 实时</span> '+hh+':'+mm+':'+ss+' ('+_refreshCount+'次)';
  el.style.opacity='1';
  setTimeout(function(){el.style.opacity='0.6';},2000);
}

function startAutoRefresh(){
  if(_refreshTimer)return;
  _refreshTimer=setInterval(function(){
    if(isMarketOpen()){
      refreshQuotes();
    }else{
      // Check every 60s if market opened
    }
  },15000);  // 15 seconds
  // Also do an immediate refresh
  if(isMarketOpen()){refreshQuotes();}
}

// ═══ Init ═══
renderGlobalBar();
renderPicks();
renderHot7();
renderSectors();
renderNightSummary();
renderPushView();
setupTabs('nightTabs','nightList',NIGHT);
setupTabs('allTabs','allList',ALL);
